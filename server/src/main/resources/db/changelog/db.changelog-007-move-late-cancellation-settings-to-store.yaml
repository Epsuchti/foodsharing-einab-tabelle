databaseChangeLog:
  - changeSet:
      id: 007-move-late-cancellation-settings-to-store
      author: codex
      changes:
        - modifyDataType:
            tableName: foodsharing_open_slot_advertisement_automations
            columnName: store_messages_json
            newDataType: VARCHAR(32600)
        - modifyDataType:
            tableName: foodsharing_open_slot_advertisement_automations
            columnName: telegram_messages_json
            newDataType: VARCHAR(32600)
        - modifyDataType:
            tableName: foodsharing_open_slot_advertisement_automations
            columnName: late_cancellation_message
            newDataType: VARCHAR(32600)
        - addDefaultValue:
            tableName: foodsharing_open_slot_advertisement_automations
            columnName: send_late_cancellation_message
            defaultValueBoolean: false
        - addDefaultValue:
            tableName: foodsharing_open_slot_advertisement_automations
            columnName: send_latest_advertisement_after_late_cancellation
            defaultValueBoolean: true
        - addColumn:
            tableName: foodsharing_open_slot_advertisement_automations
            columns:
              - column:
                  name: late_cancellation_message_maximum_hours_before_pickup
                  type: INTEGER
                  defaultValueNumeric: 72
                  constraints:
                    nullable: false
