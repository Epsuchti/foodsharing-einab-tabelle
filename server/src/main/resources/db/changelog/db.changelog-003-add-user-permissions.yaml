databaseChangeLog:
  - changeSet:
      id: 003-add-user-permissions
      author: codex
      changes:
        - addColumn:
            tableName: users
            columns:
              - column: {name: can_give_ein_abs, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: can_manage_users, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: can_use_automations, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: can_see_user_pickup_count_grouping, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: can_use_automation_slot_approval, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: can_see_all_automation_decisions, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
        - sql:
            dbms: postgresql
            sql: >-
              UPDATE users
              SET can_give_ein_abs = is_teacher,
                  can_manage_users = is_admin,
                  can_use_automations = is_admin,
                  can_see_user_pickup_count_grouping = is_admin,
                  can_use_automation_slot_approval = is_admin,
                  can_see_all_automation_decisions = is_admin

  - changeSet:
      id: 003-add-auth-session-permissions
      author: codex
      changes:
        - addColumn:
            tableName: auth_sessions
            columns:
              - column: {name: permissions, type: VARCHAR(512), defaultValue: '', constraints: {nullable: false}}

  - changeSet:
      id: 003-unique-store-automation-store
      author: codex
      changes:
        - addUniqueConstraint:
            tableName: foodsharing_store_automations
            columnNames: store_id
            constraintName: uk_foodsharing_store_automations_store


  - changeSet:
      id: 003-add-cleaning-rule-exemptions
      author: codex
      changes:
        - createTable:
            tableName: foodsharing_cleaning_rule_exemptions
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: foodsharing_id, type: VARCHAR(100), constraints: {nullable: false, unique: true}}
              - column: {name: reason, type: VARCHAR(1000), constraints: {nullable: false}}

  - changeSet:
      id: 003-drop-auth-session-roles
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: auth_sessions
            columnName: roles
      changes:
        - dropColumn:
            tableName: auth_sessions
            columnName: roles


  - changeSet:
      id: 003-drop-user-role-columns
      author: codex
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: users
            columnName: is_admin
      changes:
        - dropColumn:
            tableName: users
            columnName: is_admin
        - dropColumn:
            tableName: users
            columnName: is_teacher
