databaseChangeLog:
  - changeSet:
      id: 001-create-core-tables
      author: codex
      changes:
        - createTable:
            tableName: users
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: email, type: VARCHAR(255)}
              - column: {name: foodsharing_id, type: VARCHAR(100), constraints: {nullable: false, unique: true}}
              - column: {name: name, type: VARCHAR(200), constraints: {nullable: false}}
              - column: {name: phone_number, type: VARCHAR(50)}
              - column: {name: ical_link, type: VARCHAR(2000)}
              - column: {name: active, type: BOOLEAN, defaultValueBoolean: true, constraints: {nullable: false}}
              - column: {name: is_admin, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: is_teacher, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: preferred_language, type: VARCHAR(10), defaultValue: DE, constraints: {nullable: false}}
        - createTable:
            tableName: einabs
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: category, type: VARCHAR(64), constraints: {nullable: false}}
              - column: {name: start_date_time, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: location, type: VARCHAR(500)}
              - column: {name: public_location, type: VARCHAR(500), defaultValue: '', constraints: {nullable: false}}
              - column: {name: what_to_bring, type: VARCHAR(4000)}
              - column: {name: hint, type: VARCHAR(4000)}
              - column: {name: teacher_id, type: UUID, constraints: {nullable: false}}
              - column: {name: visit_fairteiler, type: BOOLEAN, constraints: {nullable: false}}
              - column: {name: slot_count, type: INT, constraints: {nullable: false}}
              - column: {name: minimum_pickup_count, type: INT}
        - addForeignKeyConstraint:
            baseTableName: einabs
            baseColumnNames: teacher_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_einabs_teacher
        - createTable:
            tableName: slots
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: einab_id, type: UUID, constraints: {nullable: false}}
              - column: {name: status, type: VARCHAR(32), constraints: {nullable: false}}
              - column: {name: booking_user_id, type: UUID}
              - column: {name: booked_at, type: TIMESTAMP WITH TIME ZONE}
              - column: {name: pending_confirmation_token_hash, type: VARCHAR(64)}
              - column: {name: pending_confirmation_expires_at, type: TIMESTAMP WITH TIME ZONE}
              - column: {name: done_at, type: TIMESTAMP WITH TIME ZONE}
        - addForeignKeyConstraint:
            baseTableName: slots
            baseColumnNames: einab_id
            referencedTableName: einabs
            referencedColumnNames: id
            constraintName: fk_slots_einab
        - addForeignKeyConstraint:
            baseTableName: slots
            baseColumnNames: booking_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_slots_booking_user
        - createTable:
            tableName: slot_comments
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: slot_id, type: UUID, constraints: {nullable: false}}
              - column: {name: teacher_id, type: UUID, constraints: {nullable: false}}
              - column: {name: comment, type: VARCHAR(4000), constraints: {nullable: false}}
        - addForeignKeyConstraint:
            baseTableName: slot_comments
            baseColumnNames: slot_id
            referencedTableName: slots
            referencedColumnNames: id
            constraintName: fk_slot_comments_slot
        - addForeignKeyConstraint:
            baseTableName: slot_comments
            baseColumnNames: teacher_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_slot_comments_teacher
        - createTable:
            tableName: booking_comments
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: booking_user_id, type: UUID, constraints: {nullable: false}}
              - column: {name: teacher_id, type: UUID, constraints: {nullable: false}}
              - column: {name: comment, type: VARCHAR(4000), constraints: {nullable: false}}
        - addForeignKeyConstraint:
            baseTableName: booking_comments
            baseColumnNames: booking_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_booking_comments_booking_user
        - addForeignKeyConstraint:
            baseTableName: booking_comments
            baseColumnNames: teacher_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_booking_comments_teacher
        - createTable:
            tableName: foodsharing_api_sessions
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: session_cookie_ciphertext, type: TEXT}
              - column: {name: csrf_token_ciphertext, type: TEXT}
              - column: {name: authenticated_at, type: TIMESTAMP WITH TIME ZONE}
        - createTable:
            tableName: foodsharing_admin_connections
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: admin_user_id, type: UUID, constraints: {nullable: false, unique: true}}
              - column: {name: foodsharing_user_id, type: VARCHAR(100)}
              - column: {name: foodsharing_email, type: VARCHAR(255), constraints: {nullable: false}}
              - column: {name: session_cookie_ciphertext, type: TEXT}
              - column: {name: csrf_token_ciphertext, type: TEXT}
              - column: {name: authenticated_at, type: TIMESTAMP WITH TIME ZONE}
        - addForeignKeyConstraint:
            baseTableName: foodsharing_admin_connections
            baseColumnNames: admin_user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_foodsharing_admin_connections_admin
        - createTable:
            tableName: foodsharing_store_automations
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: admin_connection_id, type: UUID, constraints: {nullable: false}}
              - column: {name: store_id, type: BIGINT, constraints: {nullable: false}}
              - column: {name: store_name, type: VARCHAR(255), defaultValue: '', constraints: {nullable: false}}
              - column: {name: enabled, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: gap_rule_enabled, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: minimum_gap_days, type: INT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: cleaning_rule_enabled, type: BOOLEAN, defaultValueBoolean: false, constraints: {nullable: false}}
        - addForeignKeyConstraint:
            baseTableName: foodsharing_store_automations
            baseColumnNames: admin_connection_id
            referencedTableName: foodsharing_admin_connections
            referencedColumnNames: id
            constraintName: fk_foodsharing_store_automations_connection
        - addUniqueConstraint:
            tableName: foodsharing_store_automations
            columnNames: admin_connection_id, store_id
            constraintName: uk_foodsharing_store_automations_connection_store
        - createTable:
            tableName: foodsharing_pickup_automation_audits
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: admin_connection_id, type: UUID, constraints: {nullable: false}}
              - column: {name: store_id, type: BIGINT, constraints: {nullable: false}}
              - column: {name: foodsharing_user_id, type: VARCHAR(100), constraints: {nullable: false}}
              - column: {name: pickup_date, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: dry_run, type: BOOLEAN, constraints: {nullable: false}}
              - column: {name: decision, type: VARCHAR(32), constraints: {nullable: false}}
              - column: {name: reasons, type: VARCHAR(4000), constraints: {nullable: false}}
              - column: {name: foodsharing_error, type: TEXT}
        - addForeignKeyConstraint:
            baseTableName: foodsharing_pickup_automation_audits
            baseColumnNames: admin_connection_id
            referencedTableName: foodsharing_admin_connections
            referencedColumnNames: id
            constraintName: fk_foodsharing_pickup_automation_audits_connection
        - createTable:
            tableName: login_tokens
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: foodsharing_id, type: VARCHAR(100), constraints: {nullable: false}}
              - column: {name: token_hash, type: VARCHAR(64), constraints: {nullable: false, unique: true}}
              - column: {name: expires_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: used_at, type: TIMESTAMP WITH TIME ZONE}
        - createTable:
            tableName: auth_sessions
            columns:
              - column: {name: id, type: UUID, constraints: {primaryKey: true, nullable: false}}
              - column: {name: version, type: BIGINT, defaultValueNumeric: 0, constraints: {nullable: false}}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
              - column: {name: foodsharing_id, type: VARCHAR(100), constraints: {nullable: false}}
              - column: {name: token_hash, type: VARCHAR(64), constraints: {nullable: false, unique: true}}
              - column: {name: roles, type: VARCHAR(128), constraints: {nullable: false}}
              - column: {name: expires_at, type: TIMESTAMP WITH TIME ZONE, constraints: {nullable: false}}
