spring.application.name=foodsharing-einab-tabelle
spring.datasource.url=jdbc:h2:file:./data/foodsharing;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.version.include=appVersion
management.endpoint.health.group.version.show-details=always

server.forward-headers-strategy=framework
server.tomcat.threads.max=50

app.auth.token-validity-days=365
app.auth.login-token-validity-minutes=30
app.auth.booking-confirmation-validity-minutes=60
app.frontend.base-url=http://localhost:4200
app.mail.from=${MAIL_FROM:noreply@foodsharing.network}
app.foodsharing.base-url=${FOODSHARING_BASE_URL:https://foodsharing.network}
app.foodsharing.admin-user=${FOODSHARING_ADMIN_USER:}
app.foodsharing.admin-password=${FOODSHARING_ADMIN_PASSWORD:}
app.foodsharing.token-encryption-key=${FOODSHARING_TOKEN_ENCRYPTION_KEY:}
app.foodsharing.automation.enabled=true
app.foodsharing.automation.dry-run=true
app.foodsharing.automation.cleaning-store-id=14341
app.foodsharing.automation.cleaning-back-check-months=12
app.foodsharing.automation.poll-interval=PT10M
app.foodsharing.automation.future-pickup-cache-ttl=PT15M
app.foodsharing.automation.store-pickup-cache-ttl=PT3M
app.foodsharing.automation.store-members-cache-ttl=PT3M

spring.mail.host=${SMTP_HOST:smtp.protonmail.ch}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
