spring.application.name=foodsharing-einab-tabelle
spring.datasource.url=jdbc:h2:file:./data/foodsharing;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.version.include=appVersion
management.endpoint.health.group.version.show-details=always

server.forward-headers-strategy=framework
server.tomcat.threads.max=50

app.auth.token-validity-days=365
app.auth.login-token-validity-minutes=30
app.frontend.base-url=http://localhost:4200
app.foodsharing.base-url=${FOODSHARING_BASE_URL:https://foodsharing.de}
app.foodsharing.admin-user=${FOODSHARING_ADMIN_USER:}
app.foodsharing.admin-password=${FOODSHARING_ADMIN_PASSWORD:}
app.foodsharing.token-encryption-key=${FOODSHARING_TOKEN_ENCRYPTION_KEY:}
app.foodsharing.automation.enabled=true
app.foodsharing.automation.dry-run=true
app.foodsharing.automation.cleaning-store-id=0
app.foodsharing.automation.poll-interval=PT5M
