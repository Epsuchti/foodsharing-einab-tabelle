spring.application.name=foodsharing-einab-tabelle
spring.datasource.url=jdbc:h2:file:./data/foodsharing;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.mail.host=${SPRING_MAIL_HOST:smtp.protonmail.ch}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.version.include=appVersion
management.endpoint.health.group.version.show-details=always

server.forward-headers-strategy=framework
server.tomcat.threads.max=50

app.auth.token-validity-days=365
app.auth.login-token-validity-minutes=30
app.frontend.base-url=http://localhost:4200
app.mail.from=no-reply@foodsharing.local
