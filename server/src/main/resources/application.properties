spring.application.name=foodsharing-einab-tabelle
spring.datasource.url=jdbc:h2:file:./data/foodsharing;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.mail.host=
spring.mail.port=25

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

server.forward-headers-strategy=framework
server.tomcat.threads.max=50

app.auth.token-validity-days=365
app.auth.login-token-validity-minutes=30
app.auth.admin-emails=ez@it4user.ch
app.frontend.base-url=http://localhost:4200
app.mail.from=no-reply@foodsharing.local
