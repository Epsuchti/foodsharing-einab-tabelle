openapi: 3.0.3
info:
  title: Foodsharing EinAb API
  version: 1.0.0
servers:
  - url: /
tags:
  - name: public
  - name: auth
  - name: user
  - name: teacher
  - name: admin
paths:
  /api/public/bezirke:
    get:
      tags: [public]
      operationId: getBezirke
      responses:
        '200':
          description: Active Bezirke
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BezirkListResponse'
  /api/public/bezirke/{bezirkSlug}/slots/available:
    get:
      tags: [public]
      operationId: getAvailableSlots
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/EinAbCategory'
        - name: visitFairteiler
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Available bookable slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableSlotListResponse'
  /api/public/bezirke/{bezirkSlug}/slots/{slotId}/book:
    post:
      tags: [public]
      operationId: bookSlot
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - $ref: '#/components/parameters/SlotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookSlotRequest'
      responses:
        '200':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/public/bookings/confirm:
    post:
      tags: [public]
      operationId: confirmBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTokenRequest'
      responses:
        '200':
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/public/bezirke/{bezirkSlug}/teachers/signup:
    post:
      tags: [public]
      operationId: signupTeacher
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherSignupRequest'
      responses:
        '201':
          description: Teacher created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/public/bezirke/{bezirkSlug}/notifications/subscribe:
    post:
      tags: [public]
      operationId: subscribeNotifications
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSubscriptionRequest'
      responses:
        '200':
          description: Subscription stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/public/notifications/unsubscribe:
    post:
      tags: [public]
      operationId: unsubscribeNotifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationUnsubscribeRequest'
      responses:
        '200':
          description: Subscription disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/bezirke/{bezirkSlug}/request-login:
    post:
      tags: [auth]
      operationId: requestLogin
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Foodsharing message requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/verify-token:
    post:
      tags: [auth]
      operationId: verifyLoginToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTokenRequest'
      responses:
        '200':
          description: Authenticated session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/user/bezirke/{bezirkSlug}/bookings:
    get:
      tags: [user]
      operationId: getMyBookings
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: User bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/user/me:
    get:
      tags: [user]
      operationId: getMyProfile
      responses:
        '200':
          description: Current booking user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/user/bezirke/{bezirkSlug}/bookings/{slotId}:
    delete:
      tags: [user]
      operationId: cancelMyBooking
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - $ref: '#/components/parameters/SlotId'
      responses:
        '204':
          description: Booking cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/teacher/me:
    get:
      tags: [teacher]
      operationId: getTeacherMe
      responses:
        '200':
          description: Teacher profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherSelfResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [teacher]
      operationId: updateTeacherMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeacherMeRequest'
      responses:
        '200':
          description: Updated teacher profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherSelfResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/teacher/bezirke/{bezirkSlug}/einabs:
    get:
      tags: [teacher]
      operationId: getTeacherEinAbs
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Teacher EinAbs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherEinAbListResponse'
    post:
      tags: [teacher]
      operationId: createTeacherEinAb
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertEinAbRequest'
      responses:
        '201':
          description: EinAb created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherEinAbResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/teacher/bezirke/{bezirkSlug}/einabs/{einAbId}:
    put:
      tags: [teacher]
      operationId: updateTeacherEinAb
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - $ref: '#/components/parameters/EinAbId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertEinAbRequest'
      responses:
        '200':
          description: EinAb updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherEinAbResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [teacher]
      operationId: deleteTeacherEinAb
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - $ref: '#/components/parameters/EinAbId'
      responses:
        '204':
          description: EinAb deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/teacher/bezirke/{bezirkSlug}/bookings:
    get:
      tags: [teacher]
      operationId: getTeacherBookings
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Bookings for teacher slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
  /api/teacher/bezirke/{bezirkSlug}/bookings/{bookingUserId}/comments:
    get:
      tags: [teacher]
      operationId: getTeacherBookingComments
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: bookingUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCommentListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [teacher]
      operationId: addTeacherBookingComment
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: bookingUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCommentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/teacher/ical-candidates:
    get:
      tags: [teacher]
      operationId: getTeacherIcalCandidates
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Candidate iCal events for the teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IcalCandidateListResponse'
  /api/teacher/bezirke/{bezirkSlug}/slots/{slotId}/booking:
    delete:
      tags: [teacher]
      operationId: cancelTeacherSlotBooking
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - $ref: '#/components/parameters/SlotId'
      responses:
        '200':
          description: Slot booking cancelled by teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotResponse'
  /api/admin/bezirke/{bezirkSlug}/teachers:
    parameters:
      - $ref: '#/components/parameters/BezirkSlug'
    get:
      tags: [admin]
      operationId: getAdminTeachers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All teachers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherListResponse'
  /api/admin/teachers/{teacherId}/enable:
    put:
      tags: [admin]
      operationId: enableAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/teachers/{teacherId}/disable:
    put:
      tags: [admin]
      operationId: disableAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/teachers/{teacherId}/grant-admin:
    put:
      tags: [admin]
      operationId: grantAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher granted admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
  /api/admin/teachers/{teacherId}/revoke-admin:
    put:
      tags: [admin]
      operationId: revokeAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher admin revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
  /api/admin/admins:
    get:
      tags: [admin]
      operationId: getAdminAdmins
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All admins
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherListResponse'
  /api/admin/bezirke/{bezirkSlug}:
    get:
      tags: [admin]
      operationId: getAdminBezirk
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
      responses:
        '200':
          description: Bezirk settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBezirkResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [admin]
      operationId: updateAdminBezirk
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBezirkRequest'
      responses:
        '200':
          description: Updated Bezirk settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBezirkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/bezirke/{bezirkSlug}/einabs:
    get:
      tags: [admin]
      operationId: getAdminEinAbs
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All EinAbs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEinAbListResponse'
  /api/admin/bezirke/{bezirkSlug}/bookings:
    get:
      tags: [admin]
      operationId: getAdminBookings
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
  /api/admin/bezirke/{bezirkSlug}/users:
    get:
      tags: [admin]
      operationId: getAdminUsers
      parameters:
        - $ref: '#/components/parameters/BezirkSlug'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
        - name: threePickupsOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: activeOnly
          in: query
          required: false
          schema:
            type: boolean
            default: true
        - name: unassigned
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: All booking users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBookingUserPageResponse'
  /api/admin/users/{bookingUserId}/enable:
    put:
      tags: [admin]
      operationId: enableAdminBookingUser
      parameters:
        - $ref: '#/components/parameters/BookingUserId'
      responses:
        '200':
          description: Enabled booking user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/users/{bookingUserId}/disable:
    put:
      tags: [admin]
      operationId: disableAdminBookingUser
      parameters:
        - $ref: '#/components/parameters/BookingUserId'
      responses:
        '200':
          description: Disabled booking user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/users/{bookingUserId}/grant-admin:
    put:
      tags: [admin]
      operationId: grantAdminBookingUser
      parameters:
        - $ref: '#/components/parameters/BookingUserId'
      responses:
        '200':
          description: Granted admin to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/admins/{adminUserId}/enable:
    put:
      tags: [admin]
      operationId: enableAdminUser
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Enabled admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/admins/{adminUserId}/disable:
    put:
      tags: [admin]
      operationId: disableAdminUser
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Disabled admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/admins/{adminUserId}/revoke-admin:
    put:
      tags: [admin]
      operationId: revokeAdminUser
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Admin revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/admin/users/{userId}/permissions:
    put:
      tags: [admin]
      operationId: setAdminUserPermissions
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserPermissionsRequest'
      responses:
        '200':
          description: User permissions updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/foodsharing/connect:
    post:
      tags: [admin]
      operationId: connectFoodsharing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FoodsharingConnectRequest'
      responses:
        '200':
          description: Foodsharing automation connection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodsharingConnectionStatus'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [admin]
      operationId: disconnectFoodsharing
      responses:
        '204':
          description: Foodsharing automation connection removed
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/foodsharing/status:
    get:
      tags: [admin]
      operationId: getFoodsharingStatus
      responses:
        '200':
          description: Foodsharing automation connection status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodsharingConnectionStatus'
        '403':
          $ref: '#/components/responses/Forbidden'


  /api/admin/foodsharing/request-automation-overview:
    get:
      tags: [admin]
      operationId: getFoodsharingRequestAutomationOverview
      responses:
        '200':
          description: Request automation settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodsharingRequestAutomationOverview'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/foodsharing/open-slot-advertisements-overview:
    get:
      tags: [admin]
      operationId: getFoodsharingOpenSlotAdvertisementOverview
      responses:
        '200':
          description: Open-slot advertisement automation settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodsharingOpenSlotAdvertisementOverview'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/admin/foodsharing/extra-automation-overview:
    get:
      tags: [admin]
      operationId: getFoodsharingExtraAutomationOverview
      deprecated: true
      responses:
        '200':
          description: Request and advertisement automation settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FoodsharingExtraAutomationOverview'
