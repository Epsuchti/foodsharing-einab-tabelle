openapi: 3.0.3
info:
  title: Foodsharing EinAb API
  version: 1.0.0
servers:
  - url: /
tags:
  - name: public
  - name: auth
  - name: user
  - name: teacher
  - name: admin
paths:
  /api/public/slots/available:
    get:
      tags: [public]
      operationId: getAvailableSlots
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/EinAbCategory'
        - name: visitFairteiler
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Available bookable slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableSlotListResponse'
  /api/public/slots/{slotId}/book:
    post:
      tags: [public]
      operationId: bookSlot
      parameters:
        - $ref: '#/components/parameters/SlotId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookSlotRequest'
      responses:
        '200':
          description: Booking created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/public/bookings/confirm:
    post:
      tags: [public]
      operationId: confirmBooking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTokenRequest'
      responses:
        '200':
          description: Booking confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingDetailResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/public/teachers/signup:
    post:
      tags: [public]
      operationId: signupTeacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherSignupRequest'
      responses:
        '201':
          description: Teacher created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/public/notifications/subscribe:
    post:
      tags: [public]
      operationId: subscribeNotifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSubscriptionRequest'
      responses:
        '200':
          description: Subscription stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/public/notifications/unsubscribe:
    post:
      tags: [public]
      operationId: unsubscribeNotifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationUnsubscribeRequest'
      responses:
        '200':
          description: Subscription disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/request-login:
    post:
      tags: [auth]
      operationId: requestLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Foodsharing message requested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/auth/verify-token:
    post:
      tags: [auth]
      operationId: verifyLoginToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyTokenRequest'
      responses:
        '200':
          description: Authenticated session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/user/bookings:
    get:
      tags: [user]
      operationId: getMyBookings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: User bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/user/me:
    get:
      tags: [user]
      operationId: getMyProfile
      responses:
        '200':
          description: Current booking user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/user/bookings/{slotId}:
    delete:
      tags: [user]
      operationId: cancelMyBooking
      parameters:
        - $ref: '#/components/parameters/SlotId'
      responses:
        '204':
          description: Booking cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/teacher/me:
    get:
      tags: [teacher]
      operationId: getTeacherMe
      responses:
        '200':
          description: Teacher profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherSelfResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [teacher]
      operationId: updateTeacherMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeacherMeRequest'
      responses:
        '200':
          description: Updated teacher profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherSelfResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/teacher/einabs:
    get:
      tags: [teacher]
      operationId: getTeacherEinAbs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Teacher EinAbs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherEinAbListResponse'
    post:
      tags: [teacher]
      operationId: createTeacherEinAb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertEinAbRequest'
      responses:
        '201':
          description: EinAb created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherEinAbResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/teacher/einabs/{einAbId}:
    put:
      tags: [teacher]
      operationId: updateTeacherEinAb
      parameters:
        - $ref: '#/components/parameters/EinAbId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertEinAbRequest'
      responses:
        '200':
          description: EinAb updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherEinAbResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [teacher]
      operationId: deleteTeacherEinAb
      parameters:
        - $ref: '#/components/parameters/EinAbId'
      responses:
        '204':
          description: EinAb deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/teacher/bookings:
    get:
      tags: [teacher]
      operationId: getTeacherBookings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Bookings for teacher slots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
  /api/teacher/bookings/{bookingUserId}/comments:
    get:
      tags: [teacher]
      operationId: getTeacherBookingComments
      parameters:
        - name: bookingUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Booking comments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCommentListResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [teacher]
      operationId: addTeacherBookingComment
      parameters:
        - name: bookingUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingCommentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/teacher/ical-candidates:
    get:
      tags: [teacher]
      operationId: getTeacherIcalCandidates
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Candidate iCal events for the teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IcalCandidateListResponse'
  /api/teacher/slots/{slotId}/booking:
    delete:
      tags: [teacher]
      operationId: cancelTeacherSlotBooking
      parameters:
        - $ref: '#/components/parameters/SlotId'
      responses:
        '200':
          description: Slot booking cancelled by teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotResponse'
  /api/admin/teachers:
    get:
      tags: [admin]
      operationId: getAdminTeachers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All teachers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherListResponse'
  /api/admin/teachers/{teacherId}/enable:
    put:
      tags: [admin]
      operationId: enableAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/teachers/{teacherId}/disable:
    put:
      tags: [admin]
      operationId: disableAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/teachers/{teacherId}/grant-admin:
    put:
      tags: [admin]
      operationId: grantAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher granted admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
  /api/admin/teachers/{teacherId}/revoke-admin:
    put:
      tags: [admin]
      operationId: revokeAdminTeacher
      parameters:
        - $ref: '#/components/parameters/TeacherId'
      responses:
        '200':
          description: Teacher admin revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
  /api/admin/admins:
    get:
      tags: [admin]
      operationId: getAdminAdmins
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All admins
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherListResponse'
  /api/admin/einabs:
    get:
      tags: [admin]
      operationId: getAdminEinAbs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All EinAbs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminEinAbListResponse'
  /api/admin/bookings:
    get:
      tags: [admin]
      operationId: getAdminBookings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: All bookings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
  /api/admin/users:
    get:
      tags: [admin]
      operationId: getAdminUsers
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 50
        - name: threePickupsOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: All booking users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminBookingUserPageResponse'
  /api/admin/users/{bookingUserId}/disable:
    put:
      tags: [admin]
      operationId: disableAdminBookingUser
      parameters:
        - $ref: '#/components/parameters/BookingUserId'
      responses:
        '200':
          description: Disabled booking user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/users/{bookingUserId}/grant-admin:
    put:
      tags: [admin]
      operationId: grantAdminBookingUser
      parameters:
        - $ref: '#/components/parameters/BookingUserId'
      responses:
        '200':
          description: Granted admin to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingUserResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/admins/{adminUserId}/enable:
    put:
      tags: [admin]
      operationId: enableAdminUser
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Enabled admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/admins/{adminUserId}/disable:
    put:
      tags: [admin]
      operationId: disableAdminUser
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Disabled admin user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/admin/admins/{adminUserId}/revoke-admin:
    put:
      tags: [admin]
      operationId: revokeAdminUser
      parameters:
        - name: adminUserId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Admin revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeacherResponse'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    SlotId:
      name: slotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EinAbId:
      name: einAbId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TeacherId:
      name: teacherId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingUserId:
      name: bookingUserId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        deliveryTarget:
          type: string
    ErrorResponse:
      type: object
      required: [message, status, code]
      properties:
        status:
          type: integer
        message:
          type: string
        code:
          $ref: '#/components/schemas/ErrorCode'
        details:
          type: array
          items:
            type: string
    ErrorCode:
      type: string
      enum: [AUTHENTICATION_REQUIRED, ACCESS_DENIED, VALIDATION_FAILED, RESOURCE_NOT_FOUND, UNEXPECTED_ERROR, INVALID_LOGIN_TOKEN, LOGIN_TOKEN_EXPIRED_OR_USED, ACCOUNT_NOT_FOUND, INVALID_UNSUBSCRIBE_TOKEN, TEACHER_ACCOUNT_REQUIRED, TEACHER_FOODSHARING_ID_ALREADY_EXISTS, TEACHER_NOT_FOUND, TEACHER_INACTIVE, BOOKING_USER_DISABLED, BOOKING_USER_NOT_FOUND, SLOT_NOT_FOUND, BOOKING_NOT_FOUND, SLOT_NOT_AVAILABLE, USER_ALREADY_BOOKED_WITH_TEACHER, USER_ALREADY_BOOKED_IN_CATEGORY, USER_BOOKING_LIMIT_REACHED, MINIMUM_PICKUP_COUNT_NOT_REACHED, ONLY_OWN_BOOKINGS_CANCELLABLE, ONLY_BOOKED_APPOINTMENTS_CANCELLABLE, EINAB_NOT_FOUND, ONLY_OWN_EINABS_MANAGEABLE, SLOT_COUNT_OUT_OF_RANGE, SLOT_COUNT_REDUCTION_NOT_SUPPORTED, BOOKED_SLOTS_PREVENT_DELETE, PUBLIC_LOCATION_REQUIRED, DEFAULT_ADMIN_CANNOT_BE_CHANGED, INVALID_BOOKING_CONFIRMATION_TOKEN, BOOKING_CONFIRMATION_EXPIRED]
    Language:
      type: string
      enum: [de, en, gws]
    EinAbCategory:
      type: string
      enum: [SUPERMARKET, TAKEOUT, MARKET, BAKERY, RESTAURANT, FAIRTEILER_CLEANING]
    SlotStatus:
      type: string
      enum: [AVAILABLE, PENDING_CONFIRMATION, BOOKED, DONE, CANCELLED]
    UserRole:
      type: string
      enum: [USER, TEACHER, ADMIN]
    BookSlotRequest:
      type: object
      required: [foodsharingId, language]
      properties:
        foodsharingId:
          type: string
          pattern: '^\d+$'
        language:
          $ref: '#/components/schemas/Language'
    TeacherSignupRequest:
      type: object
      required: [foodsharingId, language]
      properties:
        foodsharingId:
          type: string
          pattern: '^\d+$'
        icalLink:
          type: string
          format: uri
        language:
          $ref: '#/components/schemas/Language'
    NotificationSubscriptionRequest:
      type: object
      required: [email, language]
      properties:
        email:
          type: string
          format: email
        language:
          $ref: '#/components/schemas/Language'
    NotificationUnsubscribeRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
    NotificationSubscriptionResponse:
      type: object
      required: [email, active]
      properties:
        email:
          type: string
          format: email
        active:
          type: boolean
    LoginRequest:
      type: object
      required: [foodsharingId]
      properties:
        foodsharingId:
          type: string
          minLength: 1
    VerifyTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
    AuthResponse:
      type: object
      required: [authToken, expiresAt, roles, foodsharingId]
      properties:
        authToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        email:
          type: string
          format: email
        foodsharingId:
          type: string
        displayName:
          type: string
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRole'
    TeacherResponse:
      type: object
      required: [id, foodsharingId, name, active, isTeacher, isAdmin, language, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        foodsharingId:
          type: string
        name:
          type: string
        phoneNumber:
          type: string
        icalLink:
          type: string
        active:
          type: boolean
        isTeacher:
          type: boolean
        isAdmin:
          type: boolean
        wantsToBeTeacher:
          type: boolean
        language:
          $ref: '#/components/schemas/Language'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TeacherListResponse:
      type: object
      required: [teachers, page, size, totalElements, totalPages]
      properties:
        teachers:
          type: array
          items:
            $ref: '#/components/schemas/TeacherResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        hasNext:
          type: boolean
        hasPrevious:
          type: boolean
    TeacherSelfResponse:
      allOf:
        - $ref: '#/components/schemas/TeacherResponse'
        - type: object
          required: [icalCandidates]
          properties:
            icalCandidates:
              type: array
              items:
                $ref: '#/components/schemas/IcalCandidate'
    UpdateTeacherMeRequest:
      type: object
      required: [phoneNumber, language]
      properties:
