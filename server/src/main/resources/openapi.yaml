components:
  parameters:
    BezirkSlug:
      name: bezirkSlug
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9-]+$'
    SlotId:
      name: slotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EinAbId:
      name: einAbId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TeacherId:
      name: teacherId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookingUserId:
      name: bookingUserId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        deliveryTarget:
          type: string
    ErrorResponse:
      type: object
      required: [message, status, code]
      properties:
        status:
          type: integer
        message:
          type: string
        code:
          $ref: '#/components/schemas/ErrorCode'
        details:
          type: array
          items:
            type: string
    ErrorCode:
      type: string
      enum: [AUTHENTICATION_REQUIRED, ACCESS_DENIED, VALIDATION_FAILED, RESOURCE_NOT_FOUND, UNEXPECTED_ERROR, BEZIRK_NOT_FOUND, USER_BEZIRK_MISMATCH, NOTIFICATION_SUBSCRIPTION_BEZIRK_MISMATCH, INVALID_LOGIN_TOKEN, LOGIN_TOKEN_EXPIRED_OR_USED, ACCOUNT_NOT_FOUND, INVALID_UNSUBSCRIBE_TOKEN, TEACHER_ACCOUNT_REQUIRED, TEACHER_FOODSHARING_ID_ALREADY_EXISTS, TEACHER_NOT_FOUND, TEACHER_INACTIVE, BOOKING_USER_DISABLED, BOOKING_USER_NOT_FOUND, SLOT_NOT_FOUND, BOOKING_NOT_FOUND, SLOT_NOT_AVAILABLE, USER_ALREADY_BOOKED_WITH_TEACHER, USER_ALREADY_BOOKED_IN_CATEGORY, USER_BOOKING_LIMIT_REACHED, MINIMUM_PICKUP_COUNT_NOT_REACHED, ONLY_OWN_BOOKINGS_CANCELLABLE, ONLY_BOOKED_APPOINTMENTS_CANCELLABLE, EINAB_NOT_FOUND, ONLY_OWN_EINABS_MANAGEABLE, SLOT_COUNT_OUT_OF_RANGE, SLOT_COUNT_REDUCTION_NOT_SUPPORTED, BOOKED_SLOTS_PREVENT_DELETE, PUBLIC_LOCATION_REQUIRED, DEFAULT_ADMIN_CANNOT_BE_CHANGED, INVALID_BOOKING_CONFIRMATION_TOKEN, BOOKING_CONFIRMATION_EXPIRED]
    BezirkResponse:
      type: object
      required: [id, name, slug]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
    BezirkListResponse:
      type: object
      required: [bezirke]
      properties:
        bezirke:
          type: array
          items:
            $ref: '#/components/schemas/BezirkResponse'
    AdminBezirkResponse:
      allOf:
        - $ref: '#/components/schemas/BezirkResponse'
        - type: object
          properties:
            cleaningStoreId:
              type: integer
              format: int64
              nullable: true
    UpdateBezirkRequest:
      type: object
      properties:
        cleaningStoreId:
          type: integer
          format: int64
          minimum: 1
          nullable: true
    Language:
      type: string
      enum: [de, en, gws]
    EinAbCategory:
      type: string
      enum: [SUPERMARKET, TAKEOUT, MARKET, BAKERY, RESTAURANT, FAIRTEILER_CLEANING]
    SlotStatus:
      type: string
      enum: [AVAILABLE, PENDING_CONFIRMATION, BOOKED, DONE, CANCELLED]
    UserPermission:
      type: string
      enum: [CAN_GIVE_EIN_ABS, CAN_MANAGE_USERS, CAN_USE_AUTOMATIONS, CAN_SEE_USER_PICKUP_COUNT_GROUPING, CAN_USE_AUTOMATION_SLOT_APPROVAL, CAN_USE_AUTOMATION_REQUEST_APPROVAL, CAN_USE_AUTOMATION_OPEN_SLOT_ADVERTISING, CAN_SEE_ALL_AUTOMATION_DECISIONS]
    BookSlotRequest:
      type: object
      required: [foodsharingId, language]
      properties:
        foodsharingId:
          type: string
          pattern: '^\d+$'
        language:
          $ref: '#/components/schemas/Language'
    TeacherSignupRequest:
      type: object
      required: [foodsharingId, language]
      properties:
        foodsharingId:
          type: string
          pattern: '^\d+$'
        icalLink:
          type: string
          format: uri
        language:
          $ref: '#/components/schemas/Language'
    NotificationSubscriptionRequest:
      type: object
      required: [email, language]
      properties:
        email:
          type: string
          format: email
        language:
          $ref: '#/components/schemas/Language'
    NotificationUnsubscribeRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
    NotificationSubscriptionResponse:
      type: object
      required: [email, active, bezirk]
      properties:
        email:
          type: string
          format: email
        active:
          type: boolean
        bezirk:
          $ref: '#/components/schemas/BezirkResponse'
    LoginRequest:
      type: object
      required: [foodsharingId]
      properties:
        foodsharingId:
          type: string
          minLength: 1
    VerifyTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1
    AuthResponse:
      type: object
      required: [authToken, expiresAt, permissions, foodsharingId]
      properties:
        authToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        email:
          type: string
          format: email
        foodsharingId:
          type: string
        displayName:
          type: string
        bezirk:
          $ref: '#/components/schemas/BezirkResponse'
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/UserPermission'
    UserPermissionsRequest:
      type: object
      required: [canGiveEinAbs, canManageUsers, canUseAutomations, canSeeUserPickupCountGrouping, canUseAutomationSlotApproval, canUseAutomationRequestApproval, canUseAutomationOpenSlotAdvertising, canSeeAllAutomationDecisions]
      properties:
        canGiveEinAbs:
          type: boolean
        canManageUsers:
          type: boolean
        canUseAutomations:
          type: boolean
        canSeeUserPickupCountGrouping:
          type: boolean
        canUseAutomationSlotApproval:
          type: boolean
        canUseAutomationRequestApproval:
          type: boolean
        canUseAutomationOpenSlotAdvertising:
          type: boolean
        canSeeAllAutomationDecisions:
          type: boolean


    AutomationRunSummary:
      type: object
      required: [evaluated, acted, skipped, dryRun, messages]
      properties:
        evaluated:
          type: integer
          format: int32
        acted:
          type: integer
          format: int32
        skipped:
          type: integer
          format: int32
        dryRun:
          type: boolean
        messages:
          type: array
          items:
            type: string
    TelegramTestMessageRequest:
      type: object
      required: [chatId]
      properties:
        chatId:
          type: string
        message:
          type: string
    FoodsharingRequestAutomationRequest:
      type: object
      required: [storeName, enabled, dryRunEnabled, distanceRuleEnabled, maximumDistanceKm]
      properties:
        storeName:
          type: string
        enabled:
          type: boolean
        dryRunEnabled:
          type: boolean
        distanceRuleEnabled:
          type: boolean
        maximumDistanceKm:
          type: number
          format: double
    FoodsharingOpenSlotAdvertisementAutomationRequest:
      type: object
      required: [storeName, enabled, triggerHoursBefore, sendToStoreChat, sendToTelegram, messages]
      properties:
        storeName:
          type: string
        enabled:
          type: boolean
        triggerHoursBefore:
          type: integer
          format: int32
        sendToStoreChat:
          type: boolean
        sendToTelegram:
          type: boolean
        telegramChatId:
          type: string
        messages:
          type: array
          items:
            type: string
    FoodsharingRequestAutomation:
      type: object
      required: [storeId, storeName, enabled, dryRunEnabled, distanceRuleEnabled, maximumDistanceKm, editable]
      properties:
        storeId:
          type: integer
          format: int64
        storeName:
          type: string
        enabled:
          type: boolean
        dryRunEnabled:
          type: boolean
        distanceRuleEnabled:
          type: boolean
        maximumDistanceKm:
          type: number
          format: double
        editable:
          type: boolean
    FoodsharingOpenSlotAdvertisementAutomation:
      type: object
      required: [storeId, storeName, advertNumber, enabled, triggerHoursBefore, sendToStoreChat, sendToTelegram, messages, editable]
      properties:
        storeId:
          type: integer
          format: int64
        storeName:
          type: string
        advertNumber:
          type: integer
          format: int32
        enabled:
          type: boolean
        triggerHoursBefore:
          type: integer
          format: int32
        sendToStoreChat:
          type: boolean
        sendToTelegram:
          type: boolean
        telegramChatId:
          type: string
        messages:
          type: array
          items:
            type: string
        editable:
          type: boolean
    FoodsharingExtraAutomationOverview:
      type: object
      required: [requestAutomations, advertisementAutomations]
      properties:
        requestAutomations:
          type: array
          items:
            $ref: '#/components/schemas/FoodsharingRequestAutomation'
        advertisementAutomations:
          type: array
          items:
            $ref: '#/components/schemas/FoodsharingOpenSlotAdvertisementAutomation'
    FoodsharingRequestAutomationOverview:
      type: object
      required: [requestAutomations]
      properties:
        requestAutomations:
          type: array
          items:
            $ref: '#/components/schemas/FoodsharingRequestAutomation'
    FoodsharingOpenSlotAdvertisementOverview:
      type: object
      required: [advertisementAutomations]
      properties:
        advertisementAutomations:
          type: array
          items:
            $ref: '#/components/schemas/FoodsharingOpenSlotAdvertisementAutomation'

    FoodsharingExtraAutomationAudit:
      type: object
      required: [automationType, storeId, dryRun, status, createdAt]
      properties:
        automationType:
          type: string
        storeId:
          type: integer
          format: int64
        storeName:
          type: string
        pickupDate:
          type: string
          format: date-time
        foodsharingUserId:
          type: string
        foodsharingUserName:
          type: string
        dryRun:
          type: boolean
        status:
          type: string
        reason:
          type: string
        message:
          type: string
        error:
          type: string
        createdAt:
          type: string
          format: date-time
    TelegramChat:
      type: object
      required: [id, title, type]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
    FoodsharingConnectRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        telegramBotToken:
          type: string
    FoodsharingTelegramBotTokenRequest:
      type: object
      required: [telegramBotToken]
      properties:
        telegramBotToken:
          type: string
    FoodsharingConnectionStatus:
      type: object
      required: [connected]
      properties:
        connected:
          type: boolean
        email:
          type: string
          format: email
        foodsharingUserId:
          type: string
        authenticatedAt:
          type: string
          format: date-time
        telegramBotTokenConfigured:
          type: boolean
        automationEnabled:
          type: boolean
        automationDryRun:
          type: boolean
    FoodsharingStoreAutomationRequest:
      type: object
      required: [enabled, dryRunEnabled, gapRuleEnabled, minimumGapDays, cleaningRuleEnabled, experienceRuleEnabled]
      properties:
        storeName:
          type: string
        enabled:
          type: boolean
        dryRunEnabled:
          type: boolean
        gapRuleEnabled:
          type: boolean
        minimumGapDays:
          type: integer
          format: int32
          minimum: 0
        cleaningRuleEnabled:
          type: boolean
        experienceRuleEnabled:
          type: boolean
    FoodsharingStoreAutomation:
      allOf:
        - $ref: '#/components/schemas/FoodsharingStoreAutomationRequest'
        - type: object
          required: [storeId, storeName, editable]
          properties:
            storeId:
              type: integer
              format: int64
            storeName:
              type: string
            editable:
              type: boolean
            ownerName:
              type: string
              nullable: true
            ownerEmail:
              type: string
              nullable: true
    FoodsharingManagedStore:
      type: object
      required: [storeId, storeName]
      properties:
        storeId:
          type: integer
          format: int64
        storeName:
          type: string
    FoodsharingStoreAutomationOverview:
      type: object
      required: [automations, availableStores]
      properties:
        automations:
          type: array
          items:
            $ref: '#/components/schemas/FoodsharingStoreAutomation'
        availableStores:
